<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__PLAYER_TITLE__</title>
  <style>

    .shell{min-height:100%;padding:18px;display:grid;gap:14px}
    .hero,.controls,.layout,.fallback{border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}

    .controls label{display:block;margin-bottom:6px;font-size:12px;color:var(--muted)}.controls select,.controls input,.controls button{width:100%;min-height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.9);padding:8px 12px;font-size:14px;color:var(--ink)}

    .layout{display:grid;grid-template-columns:minmax(0,1.9fr) minmax(350px,.9fr);min-height:740px;background:rgba(255,250,243,.7)}
    .map-pane{position:relative;min-height:740px;background:#dbe5e5}#map{position:absolute;inset:0}
    .hud,.status{position:absolute;left:18px;z-index:2;border-radius:18px;background:rgba(20,27,30,.72);color:#f8fafc;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px)}

    .status{bottom:18px;padding:12px 14px;width:min(420px,calc(100% - 36px));font-size:13px;line-height:1.45}

  </style>
</head>

    </section>
    <div class="fallback" id="fallbackBox"></div>
  </div>

      function cameraTarget(){const step=currentStep(),steps=filteredSteps(),segments=filteredSegments(),nodes=filteredNodes(),currentSegment=segments.find(segment=>step&&segment.day===step.day&&segment.step_index===step.step_index)||null,currentNode=nodes.find(node=>step&&node.day===step.day&&node.step_index===step.step_index)||null;if(!step||!currentNode)return null;let focusPoints=[[currentNode.lon,currentNode.lat]];if(state.playMode==="顺序播放"&&currentSegment&&currentSegment.path&&currentSegment.path.length>=2){focusPoints=partialPath(currentSegment.path,state.segmentProgress).concat([currentSegment.path[currentSegment.path.length-1]]);const idx=steps.findIndex(item=>item.day===step.day&&item.step_index===step.step_index),nextStep=idx>=0?steps[idx+1]:null,nextNode=nodes.find(node=>nextStep&&node.day===nextStep.day&&node.step_index===nextStep.step_index)||null;if(nextNode)focusPoints.push([nextNode.lon,nextNode.lat])}const stats=boundsStats(focusPoints),lonSpan=Math.max(.0018,stats.maxLon-stats.minLon),latSpan=Math.max(.0014,stats.maxLat-stats.minLat),offset=window.innerWidth>960?.18:.06;return{lon:(stats.minLon+stats.maxLon)/2-lonSpan*offset,lat:(stats.minLat+stats.maxLat)/2,zoom:currentSegment&&state.playMode==="顺序播放"?zoomForSpan(Math.max(lonSpan,latSpan)):(state.dayMode==="全部"?12.2:13.6)}}
      function updateCamera(){if(!map||state.cameraMode==="固定镜头"||state.playMode!=="顺序播放")return;const target=cameraTarget();if(!target)return;if(state.cameraLon===null||state.cameraLat===null||state.cameraZoom===null){state.cameraLon=target.lon;state.cameraLat=target.lat;state.cameraZoom=target.zoom;if(typeof map.setCenter==="function")map.setCenter(new TMap.LatLng(state.cameraLat,state.cameraLon));if(typeof map.setZoom==="function")map.setZoom(state.cameraZoom);return}state.cameraLon+=(target.lon-state.cameraLon)*.15;state.cameraLat+=(target.lat-state.cameraLat)*.15;state.cameraZoom+=(target.zoom-state.cameraZoom)*.08;if(typeof map.setCenter==="function")map.setCenter(new TMap.LatLng(state.cameraLat,state.cameraLon));if(typeof map.setZoom==="function")map.setZoom(state.cameraZoom)}
      function updateHero(step){if(!step){els.headline.textContent="当前没有可播放步骤";els.subheadline.textContent="请重新生成路线或切换有效的播放范围。";els.metaMode.textContent="等待有效路线";els.metaDay.textContent="无可用地图";els.metaProgress.textContent="总进度 0%";return}els.headline.textContent=step.headline;els.subheadline.textContent=step.subheadline;els.metaMode.textContent=`${state.playMode} · ${state.cameraMode}`;els.metaDay.textContent=`${panelDayLabel()} · ${panelSteps().length} 站`;els.metaProgress.textContent=`总进度 ${overallProgress(step)}%`}
      function updateCurrentCard(step){if(!step){els.currentTitle.textContent="等待加载";els.currentDesc.textContent="";els.currentAddress.textContent="";els.weatherText.textContent="";els.currentDayBadge.textContent="当日";return}els.currentDayBadge.textContent=`第 ${step.day} 天`;els.currentTitle.textContent=step.sidebar_title;els.currentDesc.textContent=step.sidebar_desc;els.currentAddress.textContent=step.address?`地址：${step.address}`:"地址：待补充";els.weatherText.textContent=step.weather_note?`天气提醒：${step.weather_note}`:"天气提醒：暂无"}
      function updateTransportCard(step){els.panelDayLabel.textContent=panelDayLabel();if(!step){els.nextTransport.textContent="等待加载";els.nextTransportDesc.textContent="";return}if(step.next_transport_type){const progressText=state.playMode==="顺序播放"&&state.segmentProgress>0&&state.segmentProgress<1?`｜当前段 ${Math.round(state.segmentProgress*100)}%`:"";els.nextTransport.textContent=`${step.next_transport_type}｜约 ${step.next_transport_duration} 分钟｜${Math.round(step.next_transport_cost)} 元｜${step.next_transport_distance_km.toFixed(1)} km${progressText}`;els.nextTransportDesc.textContent=step.next_transport_desc||""}else{els.nextTransport.textContent="当前站点为当日末站，没有后续市内移动。";els.nextTransportDesc.textContent=""}}
      function updateHud(step){const visible=filteredSteps(),today=panelSteps(),dayIndex=step?today.findIndex(item=>item.day===step.day&&item.step_index===step.step_index):-1;els.hudCurrentIndex.textContent=step?`${state.stepIndex+1} / ${visible.length}`:"0 / 0";els.hudCurrentTitle.textContent=step?step.sidebar_title:"等待加载";els.hudDayProgress.textContent=step&&today.length?`${Math.round(((dayIndex+1)/today.length)*100)}%`:"0%";els.hudDayDetail.textContent=step?`${panelDayLabel()} · 第 ${Math.max(1,dayIndex+1)} 站`:"当前日";els.hudTotalProgress.textContent=`${overallProgress(step)}%`;els.hudTotalDetail.textContent=step?`${bundle.request_summary.origin} -> ${bundle.request_summary.destination}`:"全行程尚未开始"}
      function buildPanel(force){const steps=panelSteps(),key=`${state.dayMode}|${panelDayLabel()}|${steps.length}`;els.stepsHeader.textContent=state.dayMode==="全部"?"当前日步骤面板":"当日步骤面板";els.stepsDayPill.textContent=panelDayLabel();els.panelCountText.textContent=String(steps.length);if(!force&&key===lastPanelKey)return;lastPanelKey=key;els.stepsList.innerHTML="";steps.forEach(item=>{const card=document.createElement("div");card.className="step";card.dataset.stepKey=`${item.day}-${item.step_index}`;const color=dayColor(item.day);card.innerHTML=`<div class="step-meta"><span style="color:${color};font-weight:700;">第 ${item.day} 天 · 第 ${item.step_index} 站</span><span>${item.next_transport_type||"停留中"}</span></div><div class="step-title">${item.sidebar_title}</div><div class="step-desc">${item.sidebar_desc}</div>`;card.addEventListener("click",()=>{const index=filteredSteps().findIndex(candidate=>candidate.day===item.day&&candidate.step_index===item.step_index);if(index>=0){state.stepIndex=index;state.isPlaying=false;state.segmentProgress=0;state.cameraLon=null;state.cameraLat=null;state.cameraZoom=null;render(true)}});els.stepsList.appendChild(card)})}
      function updatePanelHighlight(step,scroll){if(!step)return;const steps=panelSteps(),currentKey=`${step.day}-${step.step_index}`,currentIndex=steps.findIndex(item=>`${item.day}-${item.step_index}`===currentKey);els.panelProgressText.textContent=currentIndex>=0?`${currentIndex+1} / ${steps.length}`:`0 / ${steps.length}`;Array.from(els.stepsList.children).forEach((child,index)=>{child.classList.remove("done","current");if(index<currentIndex)child.classList.add("done");if(index===currentIndex)child.classList.add("current")});if(!scroll&&currentKey===lastHighlightKey)return;lastHighlightKey=currentKey;const currentCard=els.stepsList.querySelector(`[data-step-key="${currentKey}"]`);if(!currentCard)return;const safeBottom=24,maxTop=Math.max(0,els.stepsList.scrollHeight-els.stepsList.clientHeight+safeBottom),targetTop=Math.min(maxTop,Math.max(0,currentCard.offsetTop-(els.stepsList.clientHeight-currentCard.offsetHeight)/2+safeBottom/2));els.stepsList.scrollTo({top:targetTop,behavior:"smooth"})}
      function render(forcePanel){const step=currentStep(),currentSegment=filteredSegments().find(segment=>step&&segment.day===step.day&&segment.step_index===step.step_index)||null;els.frameSlider.max=Math.max(0,filteredSteps().length-1);els.frameSlider.value=String(state.stepIndex);updateHero(step);updateCurrentCard(step);updateTransportCard(step);updateHud(step);buildPanel(!!forcePanel);updatePanelHighlight(step,true);if(window.TMap&&window.__TENCENT_KEY__){els.fallbackBox.style.display="none";createMapIfNeeded();rebuildMapLayers();updateCamera()}else{els.fallbackBox.style.display="block";els.fallbackBox.textContent="腾讯地图 JS 未成功加载，当前播放器仅保留步骤面板。请检查 TENCENT_MAP_JS_KEY 或网络环境。"}els.mapStatus.textContent=step?(currentSegment&&currentSegment.path_status==="missing"?`当前视图：${state.dayMode}｜${state.playMode}｜${state.cameraMode}｜该段真实路径缺失，未绘制替代直线。`:`当前视图：${state.dayMode}｜${state.playMode}｜${state.cameraMode}｜已显示 ${state.stepIndex+1} / ${filteredSteps().length} 个步骤。`):"当前没有可显示步骤。"}
      function tick(timestamp){if(state.isPlaying&&state.playMode==="顺序播放"){const step=currentStep();if(!step){state.isPlaying=false;state.segmentProgress=0;render(true);requestAnimationFrame(tick);return}if(!state.lastTick)state.lastTick=timestamp;const elapsed=timestamp-state.lastTick;state.segmentProgress=Math.max(0,Math.min(1,elapsed/speedDurationMs()));render(false);if(elapsed>=speedDurationMs()){state.lastTick=timestamp;state.segmentProgress=0;const steps=filteredSteps();if(state.stepIndex>=steps.length-1){state.isPlaying=false;state.segmentProgress=1;render(true)}else{const prevDay=step.day;state.stepIndex+=1;render(prevDay!==currentStep().day)}}}requestAnimationFrame(tick)}
      function resetView(forcePanel){state.isPlaying=false;state.segmentProgress=0;state.cameraLon=null;state.cameraLat=null;state.cameraZoom=null;lastFilterKey="";if(forcePanel){lastPanelKey="";lastHighlightKey=""}render(forcePanel)}
      els.dayMode.addEventListener("change",function(){state.dayMode=this.value;state.stepIndex=0;resetView(true)});els.playMode.addEventListener("change",function(){state.playMode=this.value;state.stepIndex=0;resetView(true)});els.speedMode.addEventListener("change",function(){state.speedMode=this.value});els.cameraMode.addEventListener("change",function(){state.cameraMode=this.value;state.cameraLon=null;state.cameraLat=null;state.cameraZoom=null;render(false)});els.frameSlider.addEventListener("input",function(){state.stepIndex=Number(this.value);resetView(true)});els.playBtn.addEventListener("click",function(){if(state.playMode!=="顺序播放"){state.playMode="顺序播放";els.playMode.value=state.playMode}state.isPlaying=true;state.lastTick=0;state.segmentProgress=0;render(false)});els.pauseBtn.addEventListener("click",function(){state.isPlaying=false});els.resetBtn.addEventListener("click",function(){state.stepIndex=0;resetView(true)});
      render(true);requestAnimationFrame(tick);
